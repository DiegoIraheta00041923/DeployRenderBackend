spring:
  application:
    name: Lab3

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/lab3
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
